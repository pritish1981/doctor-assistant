spring:
  application:
    name: doctor-assistant

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/doctor_assistant}
    username: ${DATABASE_USERNAME:doctor_assistant}
    password: ${DATABASE_PASSWORD:doctor_assistant}
    hikari:
      pool-name: DoctorAssistantPool
      maximum-pool-size: ${DATABASE_POOL_MAX_SIZE:20}
      minimum-idle: ${DATABASE_POOL_MIN_IDLE:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4.1-mini}
          temperature: ${OPENAI_CHAT_TEMPERATURE:0.3}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
          dimensions: ${OPENAI_EMBEDDING_DIMENSIONS:1536}
    vectorstore:
      pgvector:
        table-name: ${PGVECTOR_TABLE_NAME:vector_store}
        schema-name: ${PGVECTOR_SCHEMA_NAME:public}
        index-type: ${PGVECTOR_INDEX_TYPE:HNSW}
        distance-type: ${PGVECTOR_DISTANCE_TYPE:COSINE_DISTANCE}
        dimensions: ${OPENAI_EMBEDDING_DIMENSIONS:1536}
        id-type: ${PGVECTOR_ID_TYPE:UUID}
        initialize-schema: false
        remove-existing-vector-store-table: false
        schema-validation: true
        max-document-batch-size: ${PGVECTOR_MAX_BATCH_SIZE:10000}
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
    mcp:
      server:
        enabled: ${MCP_ENABLED:false}
        name: ${MCP_SERVER_NAME:doctor-assistant-mcp}
        version: ${MCP_SERVER_VERSION:0.1.0}
        type: SYNC
        instructions: >-
          Doctor Assistant MCP Server for Super Clinic. Tools: findDoctor,
          getAvailability, bookAppointment. Use UUIDs from tool responses only.
        base-url: /api/v1
        sse-endpoint: /mcp/sse
        sse-message-endpoint: /mcp/message
        request-timeout: 30s
        capabilities:
          tool: true
          resource: false
          prompt: false
          completion: false
      client:
        enabled: ${MCP_CLIENT_ENABLED:false}
        name: ${MCP_CLIENT_NAME:doctor-assistant-agent}
        version: ${MCP_CLIENT_VERSION:0.1.0}
        type: SYNC
        initialized: true
        request-timeout: ${MCP_CLIENT_REQUEST_TIMEOUT:30s}
        toolcallback:
          enabled: false
        sse:
          connections:
            doctor-assistant:
              url: ${MCP_SERVER_URL:http://localhost:8080/api/v1}
              sse-endpoint: ${MCP_CLIENT_SSE_ENDPOINT:/mcp/sse}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

doctor-assistant:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  chat:
    max-history-messages: ${CHAT_MAX_HISTORY_MESSAGES:20}
    session-timeout-minutes: ${CHAT_SESSION_TIMEOUT_MINUTES:60}
  rag:
    top-k: ${RAG_TOP_K:5}
    similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.55}
    default-source-filter: ${RAG_DEFAULT_SOURCE_FILTER:}
    classpath-docs:
      enabled: ${RAG_CLASSPATH_DOCS_ENABLED:true}
      location: ${RAG_CLASSPATH_DOCS_LOCATION:classpath:docs/*.pdf}
      auto-ingest-on-startup: ${RAG_CLASSPATH_DOCS_AUTO_INGEST:true}
    chunking:
      faq-chunk-size: ${RAG_FAQ_CHUNK_SIZE:8000}
      insurance-chunk-size: ${RAG_INSURANCE_CHUNK_SIZE:500}
      insurance-chunk-overlap: ${RAG_INSURANCE_CHUNK_OVERLAP:50}
      doctor-profile-chunk-size: ${RAG_DOCTOR_PROFILE_CHUNK_SIZE:8000}
  appointment:
    slot-hold-minutes: ${APPOINTMENT_SLOT_HOLD_MINUTES:10}
  availability:
    reanchor-stale-slots-on-startup: ${AVAILABILITY_REANCHOR_STALE_SLOTS:true}
    days-ahead: ${AVAILABILITY_DAYS_AHEAD:7}
  openai:
    connect-timeout: ${OPENAI_CONNECT_TIMEOUT:10s}
    read-timeout: ${OPENAI_READ_TIMEOUT:120s}
    write-timeout: ${OPENAI_WRITE_TIMEOUT:30s}
    responses-path: ${OPENAI_RESPONSES_PATH:/v1/responses}
  mcp:
    enabled: ${MCP_ENABLED:false}
    server-url: ${MCP_SERVER_URL:http://localhost:8080/api/v1}
    server-name: ${MCP_SERVER_NAME:doctor-assistant-mcp}
    server-version: ${MCP_SERVER_VERSION:0.1.0}
    client:
      enabled: ${MCP_CLIENT_ENABLED:false}
      connection-name: doctor-assistant
      sse-endpoint: ${MCP_CLIENT_SSE_ENDPOINT:/mcp/sse}
      request-timeout: ${MCP_CLIENT_REQUEST_TIMEOUT:30s}

logging:
  level:
    root: INFO
    com.superclinic.doctorassistant: INFO
    org.springframework.ai: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"

info:
  app:
    name: ${spring.application.name}
    description: AI-powered Doctor Assistant for Super Clinic
    version: '@project.version@'
