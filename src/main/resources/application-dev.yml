spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  devtools:
    restart:
      enabled: true

management:
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    enabled: true

logging:
  level:
    com.superclinic.doctorassistant: DEBUG
    org.springframework.ai: DEBUG
    org.hibernate.SQL: DEBUG

doctor-assistant:
  mcp:
    enabled: false
  rag:
    similarity-threshold: 0.0
